<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Route Drawer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1d24;
    --paper: #f4efe6;
    --paper-2: #ebe4d4;
    --accent: #d94f2c;
    --accent-2: #2c5fd9;
    --line: #1a1d2422;
    --visited: #d94f2c;
    --pending: #1a1d24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-2);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-left: auto;
  }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  select, button, label.upload {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 14px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s ease;
  }
  select { padding-right: 24px; }
  button:hover, label.upload:hover {
    background: var(--ink);
    color: var(--paper);
  }
  button.primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  button.primary:hover {
    background: var(--ink);
    border-color: var(--ink);
  }
  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  button:disabled:hover {
    background: var(--paper);
    color: var(--ink);
  }
  label.upload input { display: none; }

  main {
    flex: 1;
    display: flex;
    min-height: 0;
    position: relative;
  }
  #map {
    flex: 1;
    background: var(--paper-2);
    cursor: crosshair;
    z-index: 1;
  }
  #map.drawing { cursor: crosshair; }

  /* Custom draw cursor — shows snap radius */
  .draw-cursor {
    position: fixed;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(217, 79, 44, 0.12);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 998;
    display: none;
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  .draw-cursor.visible { display: block; }
  .draw-cursor.snap {
    background: rgba(217, 79, 44, 0.3);
    border-color: var(--ink);
  }
  .draw-cursor::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    background: var(--ink);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  /* Panel */
  aside {
    width: 320px;
    border-left: 1px solid var(--line);
    background: var(--paper-2);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }
  .panel-header h2 {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .stats {
    display: flex;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .stats .stat strong {
    display: block;
    font-size: 22px;
    font-family: 'Fraunces', serif;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 2px;
  }
  .stats .stat span {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
  }
  .stats .stat.accent strong { color: var(--accent); }

  .route-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .route-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .route-item .num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 11px;
    background: var(--accent);
    color: var(--paper);
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .route-item .addr { line-height: 1.3; }
  .route-item .addr small {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .route-empty {
    padding: 30px 18px;
    text-align: center;
    font-style: italic;
    opacity: 0.5;
    font-size: 14px;
    line-height: 1.5;
  }
  .route-empty strong {
    display: block;
    font-style: normal;
    font-weight: 600;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    opacity: 1;
  }
  .panel-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .panel-footer .row {
    display: flex;
    gap: 8px;
  }
  .panel-footer button {
    flex: 1;
  }

  /* Custom pin markers */
  .pin {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 10px;
    color: var(--ink);
    transition: transform 0.12s ease;
  }
  .pin.visited {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
    transform: scale(1.05);
  }
  .pin.next {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }

  /* Mobile */
  @media (max-width: 768px) {
    aside {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 45vh;
      border-left: none;
      border-top: 1px solid var(--line);
      transform: translateY(calc(100% - 56px));
      transition: transform 0.25s ease;
      z-index: 1000;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.12);
    }
    aside.open {
      transform: translateY(0);
    }
    .panel-header {
      cursor: pointer;
      position: relative;
    }
    .panel-header::after {
      content: '↑';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      transition: transform 0.25s;
    }
    aside.open .panel-header::after {
      transform: translateY(-50%) rotate(180deg);
    }
    header { padding: 10px 14px; gap: 8px; }
    .title { font-size: 18px; }
    .meta { display: none; }
    .controls { width: 100%; }
    select, button, label.upload { font-size: 11px; padding: 7px 10px; }
  }

  /* Trail visualization */
  .leaflet-container { background: #e8e1d1; font-family: 'JetBrains Mono', monospace; }

  /* Draw mode banner */
  .mode-banner {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .mode-banner.visible { opacity: 1; }
  .mode-banner .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    animation: pulse 1s infinite;
  }
</style>
</head>
<body>

<header>
  <div class="title">Route<em>Drawer</em></div>
  <div class="controls">
    <select id="dataset">
      <option value="route2">Route 2 — 68 leads</option>
      <option value="route3">Route 3 — 65 leads</option>
      <option value="route5">Route 5 — 55 leads</option>
      <option value="route6">Route 6 — 80 leads</option>
      <option value="route7">Route 7 — 78 leads</option>
    </select>
    <label class="upload">
      Upload CSV
      <input type="file" id="csvUpload" accept=".csv" />
    </label>
    <button id="drawBtn" class="primary">Draw Route</button>
  </div>
  <div class="meta">Drag through pins in order</div>
</header>

<main>
  <div id="map"></div>
  <div class="draw-cursor" id="drawCursor"></div>
  <div class="mode-banner" id="modeBanner"><span class="dot"></span>Drawing — release to finish</div>

  <aside id="panel">
    <div class="panel-header" id="panelHeader">
      <h2>Walking Order</h2>
      <div class="stats">
        <div class="stat accent">
          <strong id="visitedCount">0</strong>
          <span>Stops</span>
        </div>
        <div class="stat">
          <strong id="totalCount">0</strong>
          <span>Total Pins</span>
        </div>
        <div class="stat">
          <strong id="distanceLabel">—</strong>
          <span>Distance</span>
        </div>
      </div>
    </div>
    <div class="route-list" id="routeList">
      <div class="route-empty">
        <strong>No Route Yet</strong>
        Tap <em>Draw Route</em>, then drag your finger through the pins in the order you want reps to walk them.
      </div>
    </div>
    <div class="panel-footer">
      <div class="row">
        <button id="undoBtn" disabled>Undo Last</button>
        <button id="clearBtn" disabled>Clear</button>
      </div>
      <div class="row">
        <button id="exportCsvBtn" disabled>Export CSV</button>
        <button id="exportJsonBtn" disabled>Export JSON</button>
      </div>
    </div>
  </aside>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ============ STATE ============
const state = {
  pins: [],            // {id, name, address, city, state, zip, lat, lng, marker, idx}
  order: [],           // pin indices in walking order
  drawing: false,
  trailLine: null,
  routeLine: null,
  datasetName: 'route2',
};

const SNAP_PX = 22; // snap radius in pixels — matches visible cursor

// ============ MAP ============
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false,
}).setView([28.052, -80.631], 17);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

L.control.attribution({ position: 'bottomleft', prefix: false })
  .addAttribution('© OpenStreetMap')
  .addTo(map);

// ============ DATA LOADING ============
const SAMPLES = {
  route2: 'route2.csv', route3: 'route3.csv', route5: 'route5.csv',
  route6: 'route6.csv', route7: 'route7.csv',
};

async function loadSample(name) {
  // Embedded CSV data fetched at build time would be ideal, but we'll load from same dir.
  // Since artifacts can't fetch local files, we use the embedded data below.
  const csvText = EMBEDDED_DATA[name];
  if (!csvText) { alert('Sample not found'); return; }
  const pins = parseCSV(csvText);
  setPins(pins);
  state.datasetName = name;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = parseCSVLine(lines[0]);
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const row = parseCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => obj[h] = row[idx] || '');
    const lat = parseFloat(obj['Latitude']);
    const lng = parseFloat(obj['Longitude']);
    if (!isFinite(lat) || !isFinite(lng)) continue;
    out.push({
      id: obj['Id'] || `pin-${i}`,
      name: obj['Name'] || obj['Street'] || `Stop ${i}`,
      address: obj['Street'] || '',
      city: obj['City'] || '',
      state: obj['State'] || '',
      zip: obj['Postal Code'] || '',
      originalStop: obj['Stop #'] || '',
      lat, lng,
    });
  }
  return out;
}

function parseCSVLine(line) {
  const out = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else inQuote = !inQuote;
    } else if (c === ',' && !inQuote) {
      out.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  out.push(cur);
  return out;
}

function setPins(pins) {
  // Clear existing
  state.pins.forEach(p => p.marker && map.removeLayer(p.marker));
  state.pins = [];
  state.order = [];
  if (state.trailLine) { map.removeLayer(state.trailLine); state.trailLine = null; }
  if (state.routeLine) { map.removeLayer(state.routeLine); state.routeLine = null; }

  pins.forEach((p, i) => {
    p.idx = i;
    const icon = L.divIcon({
      className: 'pin-wrap',
      html: `<div class="pin" data-idx="${i}"></div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });
    const m = L.marker([p.lat, p.lng], { icon, interactive: false }).addTo(map);
    p.marker = m;
    state.pins.push(p);
  });

  // Fit bounds
  if (pins.length > 0) {
    const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }

  refreshUI();
}

// ============ DRAWING ============
const drawBtn = document.getElementById('drawBtn');
const banner = document.getElementById('modeBanner');
const mapEl = document.getElementById('map');

drawBtn.addEventListener('click', toggleDraw);

function toggleDraw() {
  if (state.drawing) endDraw();
  else startDraw();
}

function startDraw() {
  state.drawing = true;
  mapEl.classList.add('drawing');
  banner.classList.add('visible');
  drawBtn.textContent = 'Done';
  // Disable map dragging during draw
  map.dragging.disable();
  map.touchZoom.disable();
  map.doubleClickZoom.disable();
  map.scrollWheelZoom.disable();
}

function endDraw() {
  state.drawing = false;
  mapEl.classList.remove('drawing');
  banner.classList.remove('visible');
  drawCursor.classList.remove('visible', 'snap');
  drawBtn.textContent = 'Draw Route';
  map.dragging.enable();
  map.touchZoom.enable();
  map.doubleClickZoom.enable();
  map.scrollWheelZoom.enable();
  // Clear trail
  if (state.trailLine) { map.removeLayer(state.trailLine); state.trailLine = null; }
  drawRouteLine();
}

let trailPoints = [];
const drawCursor = document.getElementById('drawCursor');

function updateCursor(clientX, clientY, hasHit) {
  drawCursor.classList.add('visible');
  drawCursor.style.left = clientX + 'px';
  drawCursor.style.top = clientY + 'px';
  drawCursor.classList.toggle('snap', !!hasHit);
}

function getEventLatLng(e) {
  const touch = e.touches?.[0] || e.changedTouches?.[0];
  const clientX = touch ? touch.clientX : e.clientX;
  const clientY = touch ? touch.clientY : e.clientY;
  const rect = mapEl.getBoundingClientRect();
  const px = clientX - rect.left;
  const py = clientY - rect.top;
  return { px, py, clientX, clientY, latlng: map.containerPointToLatLng([px, py]) };
}

function checkPinHit(px, py) {
  // Find unvisited pin within SNAP_PX
  let best = null, bestDist = SNAP_PX;
  for (const p of state.pins) {
    if (state.order.includes(p.idx)) continue;
    const pt = map.latLngToContainerPoint([p.lat, p.lng]);
    const d = Math.hypot(pt.x - px, pt.y - py);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

function handlePointerDown(e) {
  if (!state.drawing) return;
  e.preventDefault();
  trailPoints = [];
  const { px, py, latlng, clientX, clientY } = getEventLatLng(e);
  trailPoints.push(latlng);
  if (state.trailLine) map.removeLayer(state.trailLine);
  state.trailLine = L.polyline(trailPoints, {
    color: '#1a1d24', weight: 3, opacity: 0.4, dashArray: '4,6',
  }).addTo(map);
  const hit = checkPinHit(px, py);
  updateCursor(clientX, clientY, !!hit);
  if (hit) addToOrder(hit.idx);
}

function handlePointerMove(e) {
  if (!state.drawing) return;
  e.preventDefault();
  const { px, py, latlng, clientX, clientY } = getEventLatLng(e);
  const hit = checkPinHit(px, py);
  updateCursor(clientX, clientY, !!hit);
  // Only extend the trail if the pointer is down (mouse pressed or active touch)
  if (trailPoints.length === 0) return;
  trailPoints.push(latlng);
  state.trailLine.setLatLngs(trailPoints);
  if (hit) addToOrder(hit.idx);
}

function handlePointerUp(e) {
  if (!state.drawing) return;
  trailPoints = [];
  // Stay in drawing mode so user can continue drawing — they tap "Done" to finish
  if (state.trailLine) {
    map.removeLayer(state.trailLine);
    state.trailLine = null;
  }
}

function handlePointerLeave() {
  if (!state.drawing) return;
  drawCursor.classList.remove('visible', 'snap');
}

mapEl.addEventListener('mousedown', handlePointerDown);
mapEl.addEventListener('mousemove', handlePointerMove);
mapEl.addEventListener('mouseleave', handlePointerLeave);
window.addEventListener('mouseup', handlePointerUp);
mapEl.addEventListener('touchstart', handlePointerDown, { passive: false });
mapEl.addEventListener('touchmove', handlePointerMove, { passive: false });
window.addEventListener('touchend', handlePointerUp);

function addToOrder(pinIdx) {
  if (state.order.includes(pinIdx)) return;
  state.order.push(pinIdx);
  refreshUI();
  drawRouteLine();
  // Haptic feedback if available
  if (navigator.vibrate) navigator.vibrate(15);
}

function drawRouteLine() {
  if (state.routeLine) { map.removeLayer(state.routeLine); state.routeLine = null; }
  if (state.order.length < 2) return;
  const latlngs = state.order.map(i => [state.pins[i].lat, state.pins[i].lng]);
  state.routeLine = L.polyline(latlngs, {
    color: '#d94f2c', weight: 4, opacity: 0.85,
  }).addTo(map);
}

// ============ UI REFRESH ============
function refreshUI() {
  document.getElementById('visitedCount').textContent = state.order.length;
  document.getElementById('totalCount').textContent = state.pins.length;
  document.getElementById('distanceLabel').textContent = formatDistance();

  // Update pin styles
  state.pins.forEach(p => {
    const el = p.marker.getElement()?.querySelector('.pin');
    if (!el) return;
    const orderIdx = state.order.indexOf(p.idx);
    const nextIdx = state.order.length;
    const isNext = state.drawing && state.order.length > 0 && false; // not used yet
    el.classList.remove('visited', 'next');
    if (orderIdx >= 0) {
      el.classList.add('visited');
      el.textContent = orderIdx + 1;
    } else {
      el.textContent = '';
    }
  });

  // Render list
  const list = document.getElementById('routeList');
  if (state.order.length === 0) {
    list.innerHTML = `<div class="route-empty">
      <strong>No Route Yet</strong>
      Tap <em>Draw Route</em>, then drag your finger through the pins in the order you want reps to walk them.
    </div>`;
  } else {
    list.innerHTML = state.order.map((pinIdx, i) => {
      const p = state.pins[pinIdx];
      return `<div class="route-item">
        <div class="num">${i + 1}</div>
        <div class="addr">${escapeHTML(p.address || p.name)}<small>${escapeHTML(p.city)}, ${escapeHTML(p.state)} ${escapeHTML(p.zip)}</small></div>
      </div>`;
    }).join('');
  }

  // Buttons
  const hasOrder = state.order.length > 0;
  document.getElementById('undoBtn').disabled = !hasOrder;
  document.getElementById('clearBtn').disabled = !hasOrder;
  document.getElementById('exportCsvBtn').disabled = !hasOrder;
  document.getElementById('exportJsonBtn').disabled = !hasOrder;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function formatDistance() {
  if (state.order.length < 2) return '—';
  let m = 0;
  for (let i = 1; i < state.order.length; i++) {
    const a = state.pins[state.order[i-1]];
    const b = state.pins[state.order[i]];
    m += haversine(a.lat, a.lng, b.lat, b.lng);
  }
  if (m < 1000) return Math.round(m) + 'm';
  return (m / 1609.344).toFixed(2) + 'mi';
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============ ACTIONS ============
document.getElementById('undoBtn').addEventListener('click', () => {
  state.order.pop();
  refreshUI();
  drawRouteLine();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  state.order = [];
  refreshUI();
  drawRouteLine();
});

document.getElementById('exportCsvBtn').addEventListener('click', () => {
  const headers = ['Stop #','Name','Street','City','State','Postal Code','Latitude','Longitude','Id'];
  const rows = [headers.join(',')];
  state.order.forEach((pinIdx, i) => {
    const p = state.pins[pinIdx];
    rows.push([
      i + 1,
      csvCell(p.name), csvCell(p.address), csvCell(p.city),
      csvCell(p.state), csvCell(p.zip), p.lat, p.lng, csvCell(p.id),
    ].join(','));
  });
  download(`${state.datasetName}-ordered.csv`, rows.join('\n'), 'text/csv');
});

document.getElementById('exportJsonBtn').addEventListener('click', () => {
  const data = {
    dataset: state.datasetName,
    generated: new Date().toISOString(),
    stops: state.order.map((pinIdx, i) => {
      const p = state.pins[pinIdx];
      return {
        stop: i + 1,
        id: p.id,
        name: p.name,
        address: p.address,
        city: p.city,
        state: p.state,
        zip: p.zip,
        lat: p.lat,
        lng: p.lng,
      };
    }),
  };
  download(`${state.datasetName}-ordered.json`, JSON.stringify(data, null, 2), 'application/json');
});

function csvCell(v) {
  v = String(v ?? '');
  if (/[",\n]/.test(v)) return `"${v.replace(/"/g, '""')}"`;
  return v;
}

function download(filename, text, mime) {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============ DATASET PICKER ============
document.getElementById('dataset').addEventListener('change', (e) => {
  loadSample(e.target.value);
});

document.getElementById('csvUpload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const pins = parseCSV(ev.target.result);
    if (pins.length === 0) { alert('No valid pins found in CSV'); return; }
    state.datasetName = file.name.replace(/\.csv$/i, '');
    setPins(pins);
  };
  reader.readAsText(file);
});

// ============ MOBILE PANEL ============
document.getElementById('panelHeader').addEventListener('click', () => {
  if (window.innerWidth <= 768) {
    document.getElementById('panel').classList.toggle('open');
  }
});
